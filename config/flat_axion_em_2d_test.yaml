run:
  name: flat_axion_em_2d_test

grid:
  ndim: 2
  shape: [128, 128]
  bounds:
    - [-50.0, 50.0]
    - [-50.0, 50.0]
  nghost: 3

geometry:
  type: flat

physics:
  m_axion: 0.2
  g_agamma: 0.03

potential:
  type: massive

sources:
  type: vacuum

evolution:
  evolve_axion: true
  evolve_maxwell: true
  include_axion_em_coupling: true

numerics:
  dt: 0.01
  t_final: 5.0
  output_every: 100
  derivative_order: 2

boundary:
  type: periodic

integrator:
  type: rk4

initial_data:
  type: gaussian_axion_em_ring_2d
  axion_amplitude: 1.0
  axion_center: [0.0, 0.0]
  axion_width: [8.0, 8.0]
  axion_momentum_amplitude: 0.3
  em_amplitude: 0.2
  em_center: [0.0, 0.0]
  em_width: [12.0, 12.0]
  background_Bz: 1.0

snapshots:
  save: false

diagnostics:
  full_2d_report: true
  center: [0.0, 0.0]

output:
  directory: outputs/config_flat_axion_em_2d_test
