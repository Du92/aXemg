run:
  name: sweep_constraint_solved_1d_g

grid:
  ndim: 1
  shape: [512]
  bounds:
    - [0.0, 100.0]
  nghost: 3

geometry:
  type: flat

physics:
  m_axion: 0.2
  g_agamma: 0.03

potential:
  type: massive

sources:
  type: vacuum

evolution:
  evolve_axion: true
  evolve_maxwell: true
  include_axion_em_coupling: true

numerics:
  dt: 0.01
  t_final: 15.0
  output_every: 100
  derivative_order: 2

boundary:
  type: periodic

integrator:
  type: rk4

initial_data:
  type: gaussian_axion_uniform_Bx_constraint_solved_1d
  axion_amplitude: 1.0
  axion_center: 50.0
  axion_width: 6.0
  axion_momentum_amplitude: 0.4
  g_agamma: 0.03
  Bx: 1.0
  Ex_constant: 0.0

snapshots:
  save: false

diagnostics:
  full_2d_report: false

output:
  directory: outputs/sweep_constraint_solved_1d_g/base

sweep:
  mode: list
  output_directory: outputs/sweep_constraint_solved_1d_g
  save_outputs: true
  cases:
    - physics.g_agamma: 0.0
      initial_data.g_agamma: 0.0
    - physics.g_agamma: 0.005
      initial_data.g_agamma: 0.005
    - physics.g_agamma: 0.01
      initial_data.g_agamma: 0.01
    - physics.g_agamma: 0.02
      initial_data.g_agamma: 0.02
    - physics.g_agamma: 0.03
      initial_data.g_agamma: 0.03
    - physics.g_agamma: 0.05
      initial_data.g_agamma: 0.05