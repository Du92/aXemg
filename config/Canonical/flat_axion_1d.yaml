run:
  name: flat_axion_1d

grid:
  ndim: 1
  shape: [1024]
  bounds:
    - [0.0, 100.0]
  nghost: 3

geometry:
  type: flat

physics:
  m_axion: 0.2
  g_agamma: 0.0

potential:
  type: massive

sources:
  type: vacuum

evolution:
  evolve_axion: true
  evolve_maxwell: false
  include_axion_em_coupling: false

numerics:
  dt: 0.02
  t_final: 50.0
  output_every: 100
  derivative_order: 2

boundary:
  type: periodic

integrator:
  type: rk4

initial_data:
  type: gaussian_axion_packet_1d
  amplitude: 1.0
  center: 50.0
  width: 5.0
  momentum_amplitude: 0.0

snapshots:
  save: false

diagnostics:
  full_2d_report: false

output:
  directory: outputs/config_flat_axion_1d
