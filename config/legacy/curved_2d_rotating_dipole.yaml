run:
  name: curved_2d_rotating_dipole

grid:
  ndim: 2
  shape: [192, 192]
  bounds:
    - [-60.0, 60.0]
    - [-60.0, 60.0]
  nghost: 3

geometry:
  type: smooth_compact_object_2d
  conformal_amplitude: 4.0
  compactness: 0.25
  radius: 12.0
  center: [0.0, 0.0]
  plane: xy
  plane_offset: 2.0
  lapse_floor: 0.2

physics:
  m_axion: 0.15
  g_agamma: 0.05

potential:
  type: massive

sources:
  type: vacuum

background_em:
  type: rotating_dipole_2d
  mu0: 1.0
  omega: 0.3
  inclination: 0.7
  phase0: 0.0
  center: [0.0, 0.0]
  plane: xy
  plane_offset: 2.0
  B_scale: 80.0
  softening_radius: 3.0
  star_radius: 6.0
  include_induced_E: true
  electric_scale: 1.0
  light_cylinder_limit: true
  max_velocity: 0.8
  parallel_E_fraction: 0.02
  parallel_E_profile_radius: 25.0

evolution:
  evolve_axion: true
  evolve_maxwell: false
  include_axion_em_coupling: true
  background_em_mode: replace

numerics:
  dt: 0.005
  t_final: 15.0
  output_every: 100
  derivative_order: 2

boundary:
  type: mixed
  default:
    type: outflow
  fields:
    a:
      type: sommerfeld
      asymptotic_value: 0.0
      wave_speed: 1.0
      center: [0.0, 0.0]
    Pi:
      type: sommerfeld
      asymptotic_value: 0.0
      wave_speed: 1.0
      center: [0.0, 0.0]
    E:
      type: outflow
    B:
      type: outflow

integrator:
  type: rk4

initial_data:
  type: axion_cloud_around_compact_object_2d
  axion_amplitude: 1.0
  cloud_radius: 18.0
  cloud_width: 8.0
  center: [0.0, 0.0]
  axion_background: 0.0
  angular_modulation: 0.15
  azimuthal_mode: 2
  Pi_amplitude: 0.0

snapshots:
  save: true
  every: 100
  directory: snapshots
  prefix: curved_2d_rotating_dipole

diagnostics:
  full_2d_report: true
  center: [0.0, 0.0]

output:
  directory: outputs/config_curved_2d_rotating_dipole