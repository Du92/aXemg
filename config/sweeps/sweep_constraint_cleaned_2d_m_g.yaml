run:
  name: sweep_constraint_cleaned_2d_m_g

grid:
  ndim: 2
  shape: [128, 128]
  bounds:
    - [-50.0, 50.0]
    - [-50.0, 50.0]
  nghost: 3

geometry:
  type: flat

physics:
  m_axion: 0.2
  g_agamma: 0.03

potential:
  type: massive

sources:
  type: vacuum

evolution:
  evolve_axion: true
  evolve_maxwell: true
  include_axion_em_coupling: true

numerics:
  dt: 0.01
  t_final: 5.0
  output_every: 100
  derivative_order: 2

boundary:
  type: periodic

integrator:
  type: rk4

initial_data:
  type: gaussian_axion_uniform_Bxy_constraint_solved_2d
  axion_amplitude: 1.0
  axion_center: [0.0, 0.0]
  axion_width: [8.0, 8.0]
  axion_momentum_amplitude: 0.3
  g_agamma: 0.03
  B0: [1.0, 0.5, 0.0]
  E0: [0.0, 0.0, 0.0]
  dt_for_cleaning: 0.01

snapshots:
  save: false

diagnostics:
  full_2d_report: false
  center: [0.0, 0.0]

output:
  directory: outputs/sweep_constraint_cleaned_2d_m_g/base

sweep:
  mode: list
  output_directory: outputs/sweep_constraint_cleaned_2d_m_g
  save_outputs: true
  cases:
    - physics.m_axion: 0.1
      physics.g_agamma: 0.01
      initial_data.g_agamma: 0.01
    - physics.m_axion: 0.1
      physics.g_agamma: 0.03
      initial_data.g_agamma: 0.03
    - physics.m_axion: 0.1
      physics.g_agamma: 0.05
      initial_data.g_agamma: 0.05

    - physics.m_axion: 0.2
      physics.g_agamma: 0.01
      initial_data.g_agamma: 0.01
    - physics.m_axion: 0.2
      physics.g_agamma: 0.03
      initial_data.g_agamma: 0.03
    - physics.m_axion: 0.2
      physics.g_agamma: 0.05
      initial_data.g_agamma: 0.05

    - physics.m_axion: 0.4
      physics.g_agamma: 0.01
      initial_data.g_agamma: 0.01
    - physics.m_axion: 0.4
      physics.g_agamma: 0.03
      initial_data.g_agamma: 0.03
    - physics.m_axion: 0.4
      physics.g_agamma: 0.05
      initial_data.g_agamma: 0.05