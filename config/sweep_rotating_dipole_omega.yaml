run:
  name: sweep_rotating_dipole_omega

grid:
  ndim: 2
  shape: [128, 128]
  bounds:
    - [-60.0, 60.0]
    - [-60.0, 60.0]
  nghost: 3

geometry:
  type: flat

physics:
  m_axion: 0.15
  g_agamma: 0.05

potential:
  type: massive

sources:
  type: vacuum

background_em:
  type: rotating_dipole_2d
  mu0: 1.0
  omega: 0.3
  inclination: 0.7
  phase0: 0.0
  center: [0.0, 0.0]
  plane: xy
  plane_offset: 2.0
  B_scale: 80.0
  softening_radius: 3.0
  star_radius: 6.0
  include_induced_E: true
  electric_scale: 1.0
  light_cylinder_limit: true
  max_velocity: 0.8

evolution:
  evolve_axion: true
  evolve_maxwell: false
  include_axion_em_coupling: true
  background_em_mode: replace

numerics:
  dt: 0.005
  t_final: 10.0
  output_every: 100
  derivative_order: 2

boundary:
  type: mixed
  default:
    type: outflow
  fields:
    a:
      type: sommerfeld
      asymptotic_value: 0.0
      wave_speed: 1.0
      center: [0.0, 0.0]
    Pi:
      type: sommerfeld
      asymptotic_value: 0.0
      wave_speed: 1.0
      center: [0.0, 0.0]
    E:
      type: outflow
    B:
      type: outflow

integrator:
  type: rk4

initial_data:
  type: axion_cloud_around_compact_object_2d
  axion_amplitude: 1.0
  cloud_radius: 18.0
  cloud_width: 8.0
  center: [0.0, 0.0]
  axion_background: 0.0
  angular_modulation: 0.15
  azimuthal_mode: 2
  Pi_amplitude: 0.0

snapshots:
  save: false

diagnostics:
  full_2d_report: false
  center: [0.0, 0.0]

output:
  directory: outputs/sweep_rotating_dipole_omega/base

sweep:
  mode: list
  output_directory: outputs/sweep_rotating_dipole_omega
  save_outputs: true
  cases:
    - background_em.omega: 0.0
    - background_em.omega: 0.05
    - background_em.omega: 0.1
    - background_em.omega: 0.2
    - background_em.omega: 0.3
    - background_em.omega: 0.5