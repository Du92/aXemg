run:
  name: curved_constraint_cleaned_2d

grid:
  ndim: 2
  shape: [128, 128]
  bounds:
    - [-60.0, 60.0]
    - [-60.0, 60.0]
  nghost: 3

geometry:
  type: smooth_compact_object_2d
  conformal_amplitude: 4.0
  compactness: 0.25
  radius: 12.0
  center: [0.0, 0.0]
  plane: xy
  plane_offset: 2.0
  lapse_floor: 0.2

physics:
  m_axion: 0.15
  g_agamma: 0.03

potential:
  type: massive

sources:
  type: vacuum

evolution:
  evolve_axion: true
  evolve_maxwell: true
  include_axion_em_coupling: true

numerics:
  dt: 0.002
  t_final: 5.0
  output_every: 100
  derivative_order: 2

boundary:
  type: mixed
  default:
    type: outflow
  fields:
    a:
      type: sommerfeld
      asymptotic_value: 0.0
      wave_speed: 1.0
      center: [0.0, 0.0]
    Pi:
      type: sommerfeld
      asymptotic_value: 0.0
      wave_speed: 1.0
      center: [0.0, 0.0]
    E:
      type: outflow
    B:
      type: outflow

integrator:
  type: rk4

initial_data:
  type: gaussian_axion_uniform_Bxy_constraint_solved_2d
  axion_amplitude: 1.0
  axion_center: [0.0, 0.0]
  axion_width: [10.0, 10.0]
  axion_momentum_amplitude: 0.2
  g_agamma: 0.03
  B0: [1.0, 0.5, 0.0]
  E0: [0.0, 0.0, 0.0]
  dt_for_cleaning: 0.002

  cleaning_geometry: curved
  poisson_solver: jacobi
  poisson_boundary: dirichlet
  dirichlet_value: 0.0
  max_iterations: 30000
  tolerance: 1.0e-7
  omega: 0.6666666667

snapshots:
  save: true
  every: 100
  directory: snapshots
  prefix: curved_constraint_cleaned_2d

diagnostics:
  full_2d_report: true
  center: [0.0, 0.0]

output:
  directory: outputs/config_curved_constraint_cleaned_2d